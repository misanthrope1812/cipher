<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c0e0c">
  <title>ASCII Cipher</title>
  <style>
    :root {
      --bg: #0c0e0c;
      --panel: #15181500;
      --card: #16191680;
      --field: #1b1f1b;
      --field-focus: #20251f;
      --border: #2c322c;
      --border-focus: #00e676;
      --text: #e8ece8;
      --muted: #8a948a;
      --accent: #00e676;
      --accent-dim: #00c264;
      --light: #e6e9e6;
      --grey: #353c35;
      --danger: #ff5a5a;
      --mono: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body { margin: 0; }

    body {
      font-family: var(--sans);
      background:
        radial-gradient(900px 500px at 80% -10%, rgba(0,230,118,0.10), transparent 60%),
        radial-gradient(700px 400px at -10% 110%, rgba(0,230,118,0.06), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        calc(20px + env(safe-area-inset-top))
        calc(16px + env(safe-area-inset-right))
        calc(28px + env(safe-area-inset-bottom))
        calc(16px + env(safe-area-inset-left));
      line-height: 1.45;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 6px;
    }

    .logo {
      width: 38px; height: 38px;
      flex: none;
      border-radius: 10px;
      background: linear-gradient(145deg, var(--accent), var(--accent-dim));
      color: #00200f;
      display: grid;
      place-items: center;
      font-family: var(--mono);
      font-weight: 800;
      font-size: 20px;
      box-shadow: 0 4px 18px rgba(0,230,118,0.35);
    }

    h1 {
      font-size: clamp(20px, 5vw, 26px);
      margin: 0;
      letter-spacing: -0.4px;
      font-weight: 700;
    }
    h1 span { color: var(--accent); }

    .note {
      color: var(--muted);
      font-size: 13.5px;
      margin: 4px 0 20px;
      max-width: 60ch;
    }

    .field-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.3px;
      margin: 0 0 7px 2px;
      text-transform: uppercase;
    }
    .field-label .meta { font-weight: 500; text-transform: none; font-family: var(--mono); }
    .label-right { display: flex; align-items: center; gap: 10px; }

    .clear-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color .15s, background .15s, opacity .15s;
    }
    .clear-btn:hover { color: var(--danger); background: rgba(255,90,90,0.10); }
    .clear-btn:active { transform: scale(0.95); }
    .clear-btn svg { width: 14px; height: 14px; }
    .clear-btn[disabled] { opacity: 0.4; cursor: default; pointer-events: none; }

    .pw-row { position: relative; }

    input[type="password"], input[type="text"], textarea {
      width: 100%;
      background: var(--field);
      color: var(--text);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 15px;
      font-size: 16px; /* 16px+ prevents iOS zoom-on-focus */
      font-family: var(--sans);
      transition: border-color .15s, background .15s;
      outline: none;
    }
    .pw-row input { padding-right: 52px; }

    input:focus, textarea:focus {
      border-color: var(--border-focus);
      background: var(--field-focus);
    }

    textarea {
      min-height: 150px;
      resize: vertical;
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.55;
      word-break: break-all;
    }
    textarea#output {
      background: #11140f;
      color: var(--accent);
      letter-spacing: 0.5px;
    }

    .toggle-pw {
      position: absolute;
      top: 50%;
      right: 8px;
      transform: translateY(-50%);
      width: 38px; height: 38px;
      border: 0;
      background: transparent;
      color: var(--muted);
      border-radius: 9px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .toggle-pw:hover { color: var(--text); background: #ffffff10; }
    .toggle-pw svg { width: 22px; height: 22px; }

    .group { margin-bottom: 18px; }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 4px 0 18px;
    }

    button.action {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 15px 16px;
      font-size: 15.5px;
      font-weight: 700;
      font-family: var(--sans);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform .08s, filter .15s, opacity .15s;
      min-height: 52px;
    }
    button.action:active { transform: scale(0.97); }
    button.action svg { width: 19px; height: 19px; }

    .encrypt { background: var(--accent); color: #002a14; }
    .encrypt:hover { filter: brightness(1.07); }
    .decrypt { background: var(--light); color: #15171a; }
    .decrypt:hover { filter: brightness(1.05); }

    .out-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 7px 2px;
    }
    .out-head .field-label { margin: 0; }

    .copy {
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 13.5px;
      font-weight: 600;
      font-family: var(--sans);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      transition: all .15s;
      min-height: 40px;
    }
    .copy:hover { border-color: var(--accent); color: var(--accent); }
    .copy:active { transform: scale(0.96); }
    .copy.done { border-color: var(--accent); color: var(--accent); background: rgba(0,230,118,0.10); }
    .copy svg { width: 17px; height: 17px; }

    .status {
      min-height: 20px;
      font-size: 13.5px;
      margin: 12px 2px 0;
      font-family: var(--mono);
      transition: opacity .2s;
    }
    .status.ok { color: var(--accent); }
    .status.err { color: var(--danger); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(22px + env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      background: #1d211c;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 11px 20px;
      border-radius: 30px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      z-index: 50;
      max-width: 90vw;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer {
      margin-top: 26px;
      text-align: center;
      color: #5c655c;
      font-size: 12px;
      font-family: var(--mono);
    }

    @media (min-width: 600px) {
      .btn-row { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 360px) {
      .btn-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="logo">#</div>
    <h1>ASCII <span>Cipher</span></h1>
  </header>

  <p class="note">
    Работает локально в браузере, ничего не отправляется в сеть. Шифрование AES-GCM
    с ключом из пароля (PBKDF2, 250&nbsp;000 итераций). Вывод — только ASCII-символы
    без букв и цифр.
  </p>

  <div class="group">
    <div class="field-label"><span>Пароль</span></div>
    <div class="pw-row">
      <input id="password" type="password" placeholder="Общий пароль" autocomplete="off"
             autocapitalize="off" autocorrect="off" spellcheck="false">
      <button class="toggle-pw" type="button" id="togglePw" aria-label="Показать пароль" onclick="togglePassword()">
        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="group">
    <div class="field-label">
      <span>Текст / шифр</span>
      <span class="label-right">
        <span class="meta" id="inLen">0</span>
        <button type="button" class="clear-btn" id="clearBtn" onclick="clearInput()" aria-label="Очистить поле" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
          Очистить
        </button>
      </span>
    </div>
    <textarea id="input" placeholder="Введите текст для шифрования — или вставьте ASCII-шифр для расшифровки"
              autocapitalize="off" autocorrect="off" spellcheck="false"></textarea>
  </div>

  <div class="btn-row">
    <button class="action encrypt" onclick="encryptText()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      Зашифровать
    </button>
    <button class="action decrypt" onclick="decryptText()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/>
      </svg>
      Расшифровать
    </button>
  </div>

  <div class="group">
    <div class="out-head">
      <div class="field-label"><span>Результат</span></div>
      <button class="copy" id="copyBtn" onclick="copyOutput()">
        <svg id="copyIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        <span id="copyLabel">Копировать</span>
      </button>
    </div>
    <textarea id="output" readonly placeholder="Здесь появится результат"
              onclick="this.select()"></textarea>
    <div class="status" id="status"></div>
  </div>

  <footer>locally · offline · AES-256-GCM</footer>
</div>

<div class="toast" id="toast"></div>

<script>
const alphabet = ["!", "@", "#", "$", "%", "^", "&", "*", "(", ")", "-", "_", "=", "+", "[", "]"];

/* ---------- encoding ---------- */
function bytesToSymbols(bytes) {
  let result = "";
  for (const byte of bytes) {
    result += alphabet[(byte >> 4) & 15];
    result += alphabet[byte & 15];
  }
  return result;
}

function symbolsToBytes(str) {
  const clean = str.replace(/\s/g, "");
  if (clean.length % 2 !== 0) {
    throw new Error("Некорректная длина шифра.");
  }
  const bytes = new Uint8Array(clean.length / 2);
  for (let i = 0; i < clean.length; i += 2) {
    const high = alphabet.indexOf(clean[i]);
    const low = alphabet.indexOf(clean[i + 1]);
    if (high === -1 || low === -1) {
      throw new Error("Шифр содержит недопустимые символы.");
    }
    bytes[i / 2] = (high << 4) | low;
  }
  return bytes;
}

/* ---------- key derivation ---------- */
async function deriveKey(password, salt) {
  const encoder = new TextEncoder();
  const baseKey = await crypto.subtle.importKey(
    "raw", encoder.encode(password), "PBKDF2", false, ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: salt, iterations: 250000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt", "decrypt"]
  );
}

/* ---------- encrypt / decrypt ---------- */
async function encryptText() {
  const password = document.getElementById("password").value;
  const text = document.getElementById("input").value;

  if (!password) return setStatus("Введите пароль.", "err");
  if (!text)     return setStatus("Введите текст для шифрования.", "err");

  try {
    const encoder = new TextEncoder();
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const key = await deriveKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
      { name: "AES-GCM", iv: iv }, key, encoder.encode(text)
    );
    const encryptedBytes = new Uint8Array(encrypted);

    const packageBytes = new Uint8Array(1 + salt.length + iv.length + encryptedBytes.length);
    packageBytes[0] = 1;
    packageBytes.set(salt, 1);
    packageBytes.set(iv, 1 + salt.length);
    packageBytes.set(encryptedBytes, 1 + salt.length + iv.length);

    document.getElementById("output").value = bytesToSymbols(packageBytes);
    setStatus("Зашифровано ✓", "ok");
  } catch (e) {
    setStatus("Ошибка шифрования: " + e.message, "err");
  }
}

async function decryptText() {
  const password = document.getElementById("password").value;
  const cipherText = document.getElementById("input").value;

  if (!password)   return setStatus("Введите пароль.", "err");
  if (!cipherText) return setStatus("Вставьте шифр для расшифровки.", "err");

  try {
    const packageBytes = symbolsToBytes(cipherText);
    if (packageBytes[0] !== 1) throw new Error("Неподдерживаемая версия шифра.");

    const salt = packageBytes.slice(1, 17);
    const iv = packageBytes.slice(17, 29);
    const encryptedBytes = packageBytes.slice(29);
    const key = await deriveKey(password, salt);

    const decrypted = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: iv }, key, encryptedBytes
    );

    document.getElementById("output").value = new TextDecoder().decode(decrypted);
    setStatus("Расшифровано ✓", "ok");
  } catch (e) {
    setStatus("Не удалось расшифровать — проверьте пароль или текст.", "err");
  }
}

/* ---------- copy (with fallback for file:// / old browsers) ---------- */
async function copyOutput() {
  const output = document.getElementById("output");
  const text = output.value;
  if (!text) return setStatus("Нечего копировать.", "err");

  let copied = false;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      await navigator.clipboard.writeText(text);
      copied = true;
    }
  } catch (e) { /* fall through to legacy method */ }

  if (!copied) {
    output.removeAttribute("readonly");
    output.focus();
    output.select();
    output.setSelectionRange(0, text.length);
    try { copied = document.execCommand("copy"); } catch (e) { copied = false; }
    output.setAttribute("readonly", "");
    window.getSelection().removeAllRanges();
  }

  if (copied) {
    showCopied();
    showToast("Скопировано в буфер обмена");
  } else {
    output.focus();
    output.select();
    showToast("Не удалось скопировать — текст выделен, нажмите «Копировать»");
  }
}

function showCopied() {
  const btn = document.getElementById("copyBtn");
  const label = document.getElementById("copyLabel");
  btn.classList.add("done");
  label.textContent = "Скопировано";
  setTimeout(() => {
    btn.classList.remove("done");
    label.textContent = "Копировать";
  }, 1600);
}

/* ---------- ui helpers ---------- */
function togglePassword() {
  const input = document.getElementById("password");
  const isPw = input.type === "password";
  input.type = isPw ? "text" : "password";
  document.getElementById("eyeIcon").innerHTML = isPw
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-10-7-10-7a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 10 7 10 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/>';
}

let statusTimer;
function setStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = "status " + (type || "");
  clearTimeout(statusTimer);
  if (type === "ok") statusTimer = setTimeout(() => { el.textContent = ""; el.className = "status"; }, 4000);
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}

/* clear the input field */
function clearInput() {
  const input = document.getElementById("input");
  input.value = "";
  updateInputMeta();
  input.focus();
  setStatus("Поле очищено.", "ok");
}

/* live char counter + clear-button state */
function updateInputMeta() {
  const input = document.getElementById("input");
  document.getElementById("inLen").textContent = input.value.length;
  document.getElementById("clearBtn").disabled = input.value.length === 0;
}

document.getElementById("input").addEventListener("input", updateInputMeta);
updateInputMeta();
</script>
</body>
</html>
